<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job-Moa - 메인</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #f4f5f8;
        font-family: 'Noto Sans KR', sans-serif;
        color: #4f46e5;
      }
      .loading-box {
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #eef2ff;
        border-top: 4px solid #4f46e5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-box">
      <div class="spinner"></div>
      <p>페이지로 이동 중...</p>
    </div>

    <script>
      window.onload = function () {
        location.href = './views/calendar.html';
      };
    </script>
  </body>
</html>
