<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job-Moa - 통계 분석</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f5f8;
        --white: #ffffff;
        --surface2: #f8f9fc;
        --border: #e8eaf0;
        --border2: #d4d7e3;

        --indigo: #4f46e5;
        --indigo-light: #eef2ff;
        --indigo-mid: #c7d2fe;
        --indigo-dark: #3730a3;
        --emerald: #10b981;
        --emerald-light: #ecfdf5;
        --amber: #f59e0b;
        --amber-light: #fffbeb;
        --rose: #f43f5e;
        --rose-light: #fff1f2;
        --violet: #8b5cf6;
        --violet-light: #f5f3ff;
        --sky: #0ea5e9;
        --sky-light: #f0f9ff;

        --text: #111827;
        --text2: #6b7280;
        --text3: #9ca3af;
        --text4: #d1d5db;

        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --radius: 12px;
        --topbar-h: 62px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 99px;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #topbar-root {
        height: var(--topbar-h);
        flex-shrink: 0;
      }

      .content {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 24px;
      }
      .sc {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
      }
      .sc::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .sc.i1::before {
        background: linear-gradient(90deg, var(--indigo), var(--violet));
      }
      .sc.i2::before {
        background: linear-gradient(90deg, var(--emerald), #34d399);
      }
      .sc.i3::before {
        background: linear-gradient(90deg, var(--amber), #fbbf24);
      }
      .sc.i4::before {
        background: linear-gradient(90deg, var(--rose), #fb7185);
      }

      .sc-n {
        font-family: 'DM Mono', monospace;
        font-size: 30px;
        font-weight: 700;
      }
      .i1 .sc-n {
        color: var(--indigo);
      }
      .i2 .sc-n {
        color: var(--emerald);
      }
      .i3 .sc-n {
        color: var(--amber);
      }
      .i4 .sc-n {
        color: var(--rose);
      }

      .sc-l {
        font-size: 12px;
        color: var(--text3);
        margin-top: 5px;
        font-weight: 500;
      }
      .sg {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 14px;
        margin-bottom: 14px;
      }
      .chart-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 22px;
        box-shadow: var(--shadow-sm);
      }
      .ctitle {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 16px;
      }

      .barchart {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        height: 130px;
      }
      .bwrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        flex: 1;
      }
      .bar {
        border-radius: 6px 6px 0 0;
        width: 100%;
        position: relative;
        cursor: pointer;
        transition: filter 0.15s;
      }
      .bar:hover {
        filter: brightness(0.9);
      }
      .blabel {
        font-size: 10px;
        color: var(--text3);
        font-weight: 600;
      }

      .funnel {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .frow {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .flabel {
        font-size: 12px;
        color: var(--text2);
        width: 70px;
        text-align: right;
        flex-shrink: 0;
      }
      .ftrack {
        flex: 1;
        background: var(--surface2);
        border-radius: 99px;
        height: 26px;
        overflow: hidden;
      }
      .fbar {
        height: 100%;
        border-radius: 99px;
        display: flex;
        align-items: center;
        padding-left: 10px;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
      }
      .fnum {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        width: 28px;
        text-align: right;
        flex-shrink: 0;
      }
      .btn {
        padding: 8px 16px;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        font-family: 'Noto Sans KR', sans-serif;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--indigo);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="sidebar-root"></div>

    <main class="main">
      <div id="topbar-root"></div>

      <div class="content">
        <div class="stats-row">
          <div class="sc i1">
            <div class="sc-n">24</div>
            <div class="sc-l">총 지원</div>
          </div>
          <div class="sc i2">
            <div class="sc-n">33%</div>
            <div class="sc-l">서류 합격률</div>
          </div>
          <div class="sc i3">
            <div class="sc-n">62%</div>
            <div class="sc-l">면접 전환율</div>
          </div>
          <div class="sc i4">
            <div class="sc-n">1</div>
            <div class="sc-l">최종 합격</div>
          </div>
        </div>

        <div class="sg">
          <div class="chart-card">
            <div class="ctitle">📈 월별 지원 현황</div>
            <div class="barchart">
              <div class="bwrap">
                <div
                  class="bar"
                  style="
                    height: 40%;
                    background: var(--indigo-light);
                    border: 2px solid var(--indigo-mid);
                  "
                ></div>
                <div class="blabel">10월</div>
              </div>
              <div class="bwrap">
                <div
                  class="bar"
                  style="
                    height: 55%;
                    background: var(--indigo-light);
                    border: 2px solid var(--indigo-mid);
                  "
                ></div>
                <div class="blabel">11월</div>
              </div>
              <div class="bwrap">
                <div
                  class="bar"
                  style="
                    height: 30%;
                    background: var(--indigo-light);
                    border: 2px solid var(--indigo-mid);
                  "
                ></div>
                <div class="blabel">12월</div>
              </div>
              <div class="bwrap">
                <div
                  class="bar"
                  style="
                    height: 65%;
                    background: var(--indigo-light);
                    border: 2px solid var(--indigo-mid);
                  "
                ></div>
                <div class="blabel">1월</div>
              </div>
              <div class="bwrap">
                <div
                  class="bar"
                  style="
                    height: 40%;
                    background: var(--indigo-light);
                    border: 2px solid var(--indigo-mid);
                  "
                ></div>
                <div class="blabel">2월</div>
              </div>
              <div class="bwrap">
                <div
                  class="bar"
                  style="
                    height: 100%;
                    background: linear-gradient(180deg, var(--indigo), var(--violet));
                  "
                ></div>
                <div class="blabel" style="color: var(--indigo); font-weight: 800">3월</div>
              </div>
            </div>
          </div>

          <div class="chart-card">
            <div class="ctitle">🎯 결과 분포</div>
            <div style="display: flex; flex-direction: column; gap: 10px">
              <div style="display: flex; align-items: center; gap: 8px">
                <div
                  style="
                    width: 12px;
                    height: 12px;
                    border-radius: 3px;
                    background: var(--amber);
                    flex-shrink: 0;
                  "
                ></div>
                <span style="font-size: 12px; color: var(--text2); flex: 1">진행중</span>
                <span
                  style="
                    font-family: 'DM Mono', monospace;
                    font-size: 13px;
                    font-weight: 700;
                    color: var(--text);
                  "
                  >35%</span
                >
              </div>
              <div style="display: flex; align-items: center; gap: 8px">
                <div
                  style="
                    width: 12px;
                    height: 12px;
                    border-radius: 3px;
                    background: var(--indigo);
                    flex-shrink: 0;
                  "
                ></div>
                <span style="font-size: 12px; color: var(--text2); flex: 1">대기</span>
                <span
                  style="
                    font-family: 'DM Mono', monospace;
                    font-size: 13px;
                    font-weight: 700;
                    color: var(--text);
                  "
                  >33%</span
                >
              </div>
              <div style="display: flex; align-items: center; gap: 8px">
                <div
                  style="
                    width: 12px;
                    height: 12px;
                    border-radius: 3px;
                    background: var(--emerald);
                    flex-shrink: 0;
                  "
                ></div>
                <span style="font-size: 12px; color: var(--text2); flex: 1">합격</span>
                <span
                  style="
                    font-family: 'DM Mono', monospace;
                    font-size: 13px;
                    font-weight: 700;
                    color: var(--text);
                  "
                  >12%</span
                >
              </div>
              <div style="display: flex; align-items: center; gap: 8px">
                <div
                  style="
                    width: 12px;
                    height: 12px;
                    border-radius: 3px;
                    background: var(--rose);
                    flex-shrink: 0;
                  "
                ></div>
                <span style="font-size: 12px; color: var(--text2); flex: 1">불합격</span>
                <span
                  style="
                    font-family: 'DM Mono', monospace;
                    font-size: 13px;
                    font-weight: 700;
                    color: var(--text);
                  "
                  >20%</span
                >
              </div>
            </div>
          </div>
        </div>

        <div class="chart-card">
          <div class="ctitle">🔽 단계별 전환 퍼널</div>
          <div class="funnel">
            <div class="frow">
              <div class="flabel">총 지원</div>
              <div class="ftrack">
                <div class="fbar" style="width: 100%; background: var(--indigo)">24건</div>
              </div>
              <div class="fnum" style="color: var(--indigo)">24</div>
            </div>
            <div class="frow">
              <div class="flabel">서류 합격</div>
              <div class="ftrack">
                <div class="fbar" style="width: 66%; background: var(--sky)">8건</div>
              </div>
              <div class="fnum" style="color: var(--sky)">8</div>
            </div>
            <div class="frow">
              <div class="flabel">면접 진행</div>
              <div class="ftrack">
                <div class="fbar" style="width: 45%; background: var(--amber)">5건</div>
              </div>
              <div class="fnum" style="color: var(--amber)">5</div>
            </div>
            <div class="frow">
              <div class="flabel">최종 합격</div>
              <div class="ftrack">
                <div class="fbar" style="width: 12%; background: var(--emerald)">1건</div>
              </div>
              <div class="fnum" style="color: var(--emerald)">1</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="../components/common/Sidebar.js"></script>
    <script src="../components/common/Topbar.js"></script>
    <script>
      loadSidebar('nav-stats');

      loadTopbar({
        title: '통계 분석',
        badge: 'STATS',
        showSearch: true,
        showAddButton: true,
      });
    </script>
  </body>
</html>
