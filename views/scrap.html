<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobTracker - 공고 스크랩</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f5f8;
        --white: #ffffff;
        --surface2: #f8f9fc;
        --border: #e8eaf0;
        --border2: #d4d7e3;

        --indigo: #4f46e5;
        --indigo-light: #eef2ff;
        --indigo-mid: #c7d2fe;
        --indigo-dark: #3730a3;
        --emerald: #10b981;
        --amber: #f59e0b;
        --amber-light: #fffbeb;
        --rose: #f43f5e;
        --violet: #8b5cf6;

        --text: #111827;
        --text2: #6b7280;
        --text3: #9ca3af;

        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.05);
        --shadow-indigo: 0 4px 14px rgba(79, 70, 229, 0.25);

        --sidebar-w: 230px;
        --topbar-h: 62px;
        --radius: 12px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 99px;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #topbar-root {
        height: var(--topbar-h);
        flex-shrink: 0;
      }

      .content {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .btn {
        padding: 8px 16px;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        font-family: 'Noto Sans KR', sans-serif;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-primary {
        background: var(--indigo);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
      .btn-outline {
        background: #fff;
        color: var(--text2);
        border: 1.5px solid var(--border);
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }

      .tag {
        font-size: 10.5px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 5px;
      }
      .tg {
        background: #f3f4f6;
        color: #6b7280;
      }
      .tb {
        background: var(--indigo-light);
        color: var(--indigo);
      }
      .dday {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        font-weight: 700;
      }
      .dd-r {
        color: var(--rose);
      }
      .dd-y {
        color: var(--amber);
      }

      .sgrid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      .scard {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: var(--shadow-sm);
      }
      .scard:hover {
        border-color: var(--indigo);
        box-shadow: var(--shadow);
        transform: translateY(-1px);
      }
      .clogo {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 900;
      }
      .ctags {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div id="sidebar-root"></div>

    <main class="main">
      <div id="topbar-root"></div>

      <div class="content">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
          "
        >
          <div style="font-size: 14px; color: var(--text2)">
            저장된 공고 <strong style="color: var(--text)">5개</strong>
          </div>
          <button class="btn btn-outline btn-sm" onclick="location.href = 'jobboard.html'">
            🔍 공고 탐색
          </button>
        </div>

        <div class="sgrid">
          <div class="scard">
            <div style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px">
              <div
                class="clogo"
                style="
                  background: linear-gradient(135deg, #ff8f00, #e65100);
                  width: 40px;
                  height: 40px;
                  border-radius: 10px;
                  font-size: 16px;
                "
              >
                K
              </div>
              <div style="flex: 1">
                <div style="font-size: 15px; font-weight: 800; color: var(--text)">카카오페이</div>
                <div style="font-size: 13px; color: var(--text2); margin-top: 2px">
                  iOS 개발자 (신입/경력)
                </div>
              </div>
              <span class="dday dd-r" style="font-size: 12px">D-5</span>
            </div>
            <div class="ctags" style="margin-bottom: 10px">
              <span class="tag tb">신입</span><span class="tag tg">Swift</span
              ><span class="tag tg">iOS</span>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between">
              <span style="font-size: 11px; color: var(--text3)">📌 원티드 · 저장 3.8</span>
              <button class="btn btn-primary btn-sm" onclick="openJobModal()">지원하기</button>
            </div>
          </div>

          <div class="scard">
            <div style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px">
              <div
                class="clogo"
                style="
                  background: linear-gradient(135deg, #5c6bc0, #3949ab);
                  width: 40px;
                  height: 40px;
                  border-radius: 10px;
                  font-size: 16px;
                "
              >
                S
              </div>
              <div style="flex: 1">
                <div style="font-size: 15px; font-weight: 800; color: var(--text)">스타트업A</div>
                <div style="font-size: 13px; color: var(--text2); margin-top: 2px">
                  풀스택 개발자
                </div>
              </div>
              <span class="dday dd-y" style="font-size: 12px">D-11</span>
            </div>
            <div class="ctags" style="margin-bottom: 10px">
              <span class="tag tg">React</span><span class="tag tg">Node.js</span>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between">
              <span style="font-size: 11px; color: var(--text3)">📌 사람인 · 저장 3.6</span>
              <button class="btn btn-primary btn-sm" onclick="openJobModal()">지원하기</button>
            </div>
          </div>

          <div
            class="scard"
            style="
              border-style: dashed;
              display: flex;
              align-items: center;
              justify-content: center;
              flex-direction: column;
              gap: 8px;
              color: var(--text3);
              min-height: 120px;
              box-shadow: none;
            "
            onclick="location.href = 'jobboard.html'"
          >
            <div style="font-size: 26px">🔍</div>
            <div style="font-size: 13px; font-weight: 500">공고 탐색하러 가기</div>
          </div>
        </div>
      </div>
    </main>

    <script src="../components/common/Sidebar.js"></script>
    <script src="../components/common/Topbar.js"></script>
    <script>
      loadSidebar('nav-scrap');
      loadTopbar({
        title: '공고 스크랩',
        badge: 'SCRAPS',
        showSearch: true,
        showAddButton: true,
      });
    </script>
  </body>
</html>
