        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Job-Moa - 전체 공고</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                corePlugins: {
                    preflight: false,
                },
            };

        <style>
            :root {
                --bg: #f4f5f8;
                --white: #ffffff;
                --surface2: #f8f9fc;
                --border: #e8eaf0;
                --border2: #d4d7e3;

                --indigo: #4f46e5;
                --indigo-light: #eef2ff;
                --indigo-mid: #c7d2fe;
                --indigo-dark: #3730a3;
                --emerald: #10b981;
                --emerald-light: #ecfdf5;
                --amber: #f59e0b;
                --amber-light: #fffbeb;
                --rose: #f43f5e;
                --rose-light: #fff1f2;
                --violet: #8b5cf6;
                --violet-light: #f5f3ff;
                --sky: #0ea5e9;
                --sky-light: #f0f9ff;

                --text: #111827;
                --text2: #6b7280;
                --text3: #9ca3af;
                --text4: #d1d5db;

                --shadow-sm:
                    0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
                --shadow:
                    0 4px 12px rgba(0, 0, 0, 0.06),
                    0 2px 4px rgba(0, 0, 0, 0.04);
                --shadow-lg:
                    0 10px 30px rgba(0, 0, 0, 0.1),
                    0 4px 8px rgba(0, 0, 0, 0.05);
                --shadow-indigo: 0 4px 14px rgba(79, 70, 229, 0.25);

                --sidebar-w: 230px;
                --topbar-h: 62px;
                --radius: 12px;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Noto Sans KR", sans-serif;
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                overflow: hidden;
                display: flex;
            }
            ::-webkit-scrollbar {
                width: 5px;
                height: 5px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 99px;
            }

            /* ══════ MAIN ══════ */
            .main {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* 공통 탑바가 들어갈 자리 */
            #topbar-root {
                height: var(--topbar-h);
                flex-shrink: 0;
            }

            .content {
                flex: 1;
                overflow-y: auto;
                padding: 24px;
            }

            /* ══════ TAGS ══════ */
            .tag {
                font-size: 10.5px;
                font-weight: 600;
                padding: 3px 8px;
                border-radius: 5px;
            }
            .tg {
                background: #f3f4f6;
                color: #6b7280;
            }
            .tb {
                background: var(--indigo-light);
                color: var(--indigo);
            }
            .tyellow {
                background: var(--amber-light);
                color: #d97706;
            }
            .tviolet {
                background: var(--violet-light);
                color: var(--violet);
            }
            .dday {
                font-family: "DM Mono", monospace;
                font-size: 11px;
                font-weight: 700;
            }
            .dd-r {
                color: var(--rose);
            }
            .dd-y {
                color: var(--amber);
            }
            .dd-g {
                color: var(--emerald);
            }

            /* ══════ BUTTON 스타일 (통일) ══════ */
            .btn {
                padding: 8px 16px;
                border-radius: 9px;
                font-size: 13px;
                font-weight: 700;
                cursor: pointer;
                border: none;
                font-family: "Noto Sans KR", sans-serif;
                transition: all 0.15s;
            }
            .btn-primary {
                background: var(--indigo);
                color: #fff;
            }
            .btn-primary:hover {
                opacity: 0.9;
            }
            .btn-outline {
                background: #fff;
                color: var(--text2);
                border: 1.5px solid var(--border);
            }
            .btn-sm {
                padding: 6px 12px;
                font-size: 12px;
            }

            /* ══════ JOB BOARD UI ══════ */
            .api-bar {
                background: linear-gradient(
                    135deg,
                    var(--indigo-light),
                    var(--violet-light)
                );
                border: 1.5px solid var(--indigo-mid);
                border-radius: var(--radius);
                padding: 14px 18px;
                margin-bottom: 18px;
                display: flex;
                align-items: center;
                gap: 14px;
            }
            .api-status {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 13px;
                font-weight: 600;
                color: var(--indigo);
            }
            .api-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--emerald);
                flex-shrink: 0;
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            .api-sources {
                display: flex;
                gap: 8px;
                margin-left: auto;
                flex-wrap: wrap;
            }
            .api-chip {
                font-size: 11.5px;
                font-weight: 700;
                padding: 4px 12px;
                border-radius: 99px;
                background: var(--white);
                border: 1.5px solid var(--indigo-mid);
                color: var(--indigo);
                cursor: pointer;
                transition: all 0.15s;
            }
            .api-chip.on {
                background: var(--indigo);
                color: #fff;
            }

            .jboard-top {
                display: flex;
                gap: 12px;
                margin-bottom: 18px;
                align-items: center;
            }
            .filter-row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                flex: 1;
            }
            .filter-chip {
                padding: 6px 14px;
                border-radius: 99px;
                font-size: 12.5px;
                font-weight: 600;
                cursor: pointer;
                border: 1.5px solid var(--border);
                background: var(--white);
                color: var(--text2);
                transition: all 0.15s;
            }
            .filter-chip.on {
                background: var(--indigo);
                color: #fff;
                border-color: var(--indigo);
            }

            .jgrid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
            }
            .jcard {
                background: var(--white);
                border: 1.5px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                transition: all 0.15s;
                box-shadow: var(--shadow-sm);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .jcard:hover {
                border-color: var(--indigo);
                box-shadow: var(--shadow);
                transform: translateY(-2px);
            }
            .jcard.scraped {
                border-color: var(--indigo);
                box-shadow: 0 0 0 2px var(--indigo-light);
            }

            .jtop {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 12px;
            }
            .jlogo {
                width: 38px;
                height: 38px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                font-weight: 900;
                color: #fff;
                flex-shrink: 0;
            }
            .jco {
                font-size: 14px;
                font-weight: 800;
                color: var(--text);
            }
            .jrole {
                font-size: 12.5px;
                color: var(--text2);
                margin-top: 2px;
                line-height: 1.4;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .jsource {
                font-size: 10px;
                color: var(--text3);
                margin-top: 3px;
            }

            .jbottom {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding-top: 12px;
                border-top: 1px solid var(--border);
            }
            .jactions {
                display: flex;
                gap: 6px;
            }
            .scrap-btn {
                padding: 5px 9px;
                border-radius: 7px;
                font-size: 11px;
                font-weight: 700;
                cursor: pointer;
                border: 1.5px solid var(--border);
                background: var(--white);
                color: var(--text2);
                transition: all 0.15s;
            }
            .scrap-btn.on {
                background: var(--amber-light);
                border-color: var(--amber);
                color: var(--amber);
            }
            .apply-btn {
                padding: 5px 9px;
                border-radius: 7px;
                font-size: 11px;
                font-weight: 700;
                cursor: pointer;
                border: none;
                background: var(--indigo);
                color: #fff;
                transition: all 0.15s;
            }

            /* Pagination styles removed in favor of TailwindCSS */
        </style>
    </head>

        </main>

                {

                    tags: ["경력 3년↑", "Prometheus", "Grafana"],

                    tags: ["경력", "BigQuery", "Spark"],
                    dday: "상시채용",
                    ddayColor: "dd-g",
                    logoG: "linear-gradient(135deg, #000, #111)",
                    logoL: "M",
                },
            ];

            const JOBS_PER_PAGE = 12;
            let currentPage = 1;

            function renderJobs(page) {
                const start = (page - 1) * JOBS_PER_PAGE;
                const end = start + JOBS_PER_PAGE;
                const pageJobs = JOBS_DATA.slice(start, end);

                const grid = document.getElementById("job-grid");
                grid.innerHTML = pageJobs
                    .map(
                        (job) => `
          <div class="jcard ${job.scraped ? "scraped" : ""}">
            <div class="jtop">
              <div class="jlogo" style="background: ${job.logoG}">${job.logoL}</div>
              <div>
                <div class="jco">${job.co}</div>
                <div class="jrole">${job.role}</div>
                <div class="jsource">${job.source}</div>
              </div>
            </div>
            <div class="ctags" style="margin-bottom: 10px">
              ${job.tags.map((t) => `<span class="tag ${t === "신입" ? "tb" : "tg"}">${t}</span>`).join("")}
            </div>
            <div class="jbottom">
              <span class="jdday ${job.ddayColor}">${job.dday}</span>
              <div class="jactions">
                <button class="scrap-btn ${job.scraped ? "on" : ""}" onclick="toggleScrap(this, ${job.id})">
                  ${job.scraped ? "★ 스크랩" : "☆ 스크랩"}
                </button>
                <button class="apply-btn" onclick="openJobModal()">지원하기</button>
              </div>
            </div>
          </div>
        `,
                    )
                    .join("");

                renderPagination(page);
                grid.scrollTo({ top: 0, behavior: "smooth" });
            }

            function renderPagination(page) {
                const totalPages = Math.ceil(JOBS_DATA.length / JOBS_PER_PAGE);
                const root = document.getElementById("pagination-root");
                let html = "";

                // Prev Arrow
                html += `
          <button onclick="goToPage(${page - 1})" 
            class="w-9 h-9 flex items-center justify-center rounded-lg border border-solid border-[#e8eaf0] bg-white text-[#9ca3af] font-semibold text-[13px] transition-all hover:border-[#c7d2fe] hover:text-[#4f46e5] cursor-pointer ${page === 1 ? "opacity-50 pointer-events-none" : ""}">
            ❮
          </button>
        `;

                // Page Numbers
                for (let i = 1; i <= totalPages; i++) {
                    html += `
            <button onclick="goToPage(${i})"
              class="w-9 h-9 flex items-center justify-center rounded-lg font-semibold text-[13px] transition-all border border-solid cursor-pointer ${
                  i === page
                      ? "bg-[#4f46e5] text-white border-[#4f46e5]"
                      : "bg-white text-[#6b7280] border-[#e8eaf0] hover:border-[#c7d2fe] hover:text-[#4f46e5]"
              }">
              ${i}
            </button>
          `;
                }

                // Next Arrow
                html += `
          <button onclick="goToPage(${page + 1})"
            class="w-9 h-9 flex items-center justify-center rounded-lg border border-solid border-[#e8eaf0] bg-white text-[#9ca3af] font-semibold text-[13px] transition-all hover:border-[#c7d2fe] hover:text-[#4f46e5] cursor-pointer ${page === totalPages ? "opacity-50 pointer-events-none" : ""}">
            ❯
          </button>
        `;

                root.innerHTML = html;
            }

            function goToPage(page) {
                const totalPages = Math.ceil(JOBS_DATA.length / JOBS_PER_PAGE);
                if (page < 1 || page > totalPages) return;
                currentPage = page;
                renderJobs(page);
            }

            // Initial Render
            renderJobs(1);

            function toggleScrap(btn, jobId) {
                btn.classList.toggle("on");
                btn.textContent = btn.classList.contains("on")
                    ? "★ 스크랩"
                    : "☆ 스크랩";
                const card = btn.closest(".jcard");
                const job = JOBS_DATA.find((j) => j.id === jobId);

                if (btn.classList.contains("on")) {
                    card.classList.add("scraped");
                    if (job) job.scraped = true;
                } else {
                    card.classList.remove("scraped");
                    if (job) job.scraped = false;
                }
            }

            document.querySelectorAll(".filter-chip").forEach((chip) => {
                chip.addEventListener("click", () => {
                    document
                        .querySelectorAll(".filter-chip")
                        .forEach((c) => c.classList.remove("on"));
                    chip.classList.add("on");
                    // (In actual implementation, you would filter the JOBS_DATA and re-render)
                });
            });

            document.querySelectorAll(".api-chip").forEach((chip) => {
                chip.addEventListener("click", () => {
                    chip.classList.toggle("on");
                });
            });
        </script>
    </body>
</html>
